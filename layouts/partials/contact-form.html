<!-- Contact Form with Formspree -->
<div class="contact-form-section">
  <h3>联系我们 | Contact Us</h3>
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="name">姓名 | Name *</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label for="email">邮箱 | Email *</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="organization">单位 | Organization</label>
      <input type="text" id="organization" name="organization">
    </div>
    <div class="form-group">
      <label for="subject">主题 | Subject *</label>
      <select id="subject" name="subject" required>
        <option value="">请选择 | Select</option>
        <option value="membership">会员咨询 | Membership Inquiry</option>
        <option value="cooperation">合作洽谈 | Cooperation</option>
        <option value="research">学术研究 | Research</option>
        <option value="other">其他 | Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="message">留言 | Message *</label>
      <textarea id="message" name="message" rows="5" required></textarea>
    </div>
    <button type="submit" class="submit-btn">提交 | Submit</button>
  </form>
</div>
